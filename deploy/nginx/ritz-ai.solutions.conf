# Security headers for ritz-ai.solutions
#
# .htaccess only applies under Apache and has no effect on the production
# nginx VPS deployment, so these headers are currently NOT sent in
# production. This file mirrors the headers from the repo's .htaccess.
#
# Deployment (manual, on the VPS):
#   1. Copy this file to /etc/nginx/snippets/ritz-ai.solutions.conf
#      (or include it directly in the existing server block for
#      ritz-ai.solutions).
#   2. Inside the relevant `server { ... }` block, add:
#        include /etc/nginx/snippets/ritz-ai.solutions.conf;
#   3. Test and reload:
#        nginx -t && systemctl reload nginx
#   4. Verify:
#        curl -I https://ritz-ai.solutions/
#      The headers below must appear in the response.
#
# Note: these headers only protect this site's own HTML/asset responses.
# They have no effect on requests the browser sends directly to Supabase
# (different origin) — see deploy/nginx README / audit notes for that.

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' js-de.sentry-cdn.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; img-src 'self' data:; font-src 'self' fonts.gstatic.com; connect-src 'self' *.ingest.de.sentry.io qdywaenmojdxhfxqbvun.supabase.co; frame-src cal.com *.cal.com app.cal.com; object-src 'none'; base-uri 'self'" always;

